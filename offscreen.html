<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ER Audio</title></head>
<body>
<script>
// This offscreen document exists solely so getUserMedia triggers
// Chrome's standard "Allow microphone?" permission dialog.
// Recording commands come from the service worker via messages.

let recorder = null;
let chunks = [];
let stream = null;
let audioCtx = null;
let analyser = null;
let volInterval = null;

chrome.runtime.onMessage.addListener((msg, _sender, sendResponse) => {
  if (msg.action === "start-recording") {
    startRec(sendResponse);
    return true;
  }
  if (msg.action === "stop-recording") {
    stopRec(sendResponse);
    return true;
  }
});

async function startRec(sendResponse) {
  try {
    // THIS call triggers Chrome's native mic permission prompt
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    chunks = [];

    // Volume metering
    audioCtx = new AudioContext();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);

    volInterval = setInterval(() => {
      if (!analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((s, v) => s + v, 0) / data.length;
      chrome.runtime.sendMessage({ action: "volume-level", level: Math.min(avg / 128, 1) });
    }, 100);

    const mime = MediaRecorder.isTypeSupported("audio/webm;codecs=opus")
      ? "audio/webm;codecs=opus" : "audio/webm";
    recorder = new MediaRecorder(stream, { mimeType: mime });
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.start(250);

    sendResponse({ ok: true });
  } catch (err) {
    sendResponse({ ok: false, error: err.name === "NotAllowedError"
      ? "Microphone permission denied. Please allow in site settings."
      : err.message });
  }
}

async function stopRec(sendResponse) {
  if (!recorder || recorder.state === "inactive") {
    sendResponse({ ok: false, error: "No active recording." });
    return;
  }
  recorder.onstop = async () => {
    const blob = new Blob(chunks, { type: recorder.mimeType });
    const buf = await blob.arrayBuffer();
    const bytes = Array.from(new Uint8Array(buf));
    cleanup();
    sendResponse({ ok: true, audioBytes: bytes, mimeType: blob.type });
  };
  recorder.stop();
}

function cleanup() {
  if (volInterval) { clearInterval(volInterval); volInterval = null; }
  if (analyser) { analyser.disconnect(); analyser = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  recorder = null;
  chunks = [];
}
</script>
</body>
</html>
